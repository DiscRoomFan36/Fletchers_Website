<!-- the golang wasm runtime -->
<script src="./dist/wasm_exec.js"></script>
<script>
    // create the go runtime.
    const go = new Go();
    // load the wasm binary.
    WebAssembly.instantiateStreaming(fetch("./dist/boid.wasm"), go.importObject).then((result) => {
        // run the code.
        go.run(result.instance);
    });
</script>
