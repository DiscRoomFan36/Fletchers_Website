<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Fletcher Moloney</title>
		<link rel="icon" type="image/png" href="./web_src/icon.png" />
		<link rel="stylesheet" href="./web_src/css.css" />
		<meta charset="utf-8" />
		<!-- golang runtime script -->
		<script src="./dist/wasm_exec.js"></script>
		<!-- The thing that animates the boids. -->

	<body>
		<header id="site_header">
			<h1 id="my_name_in_the_middle" class="noselect">Fletcher Moloney</h1>

		<main id="main_area">
			<div id="canvas_div">
				<div id="center_area">

						<!-- we probably do... thats just how css works... -->

							<details>
								<summary id="settings_summary">Runtime Reflection Settings</summary>
								<div id="slideContainer"></div>
							</details>
						</div>

						<div id="boid_panel">
							<div id="boid_container">
								<canvas id="boid_canvas"></canvas>

								<!-- overlay random statements inside the boid area (centered) -->
								<div id="random_statements" class="overlay_statements">
									<p class="noselect collide">60FPS Software Rendering<br>No Dependencies</p>
									<p id="not_my_passion" class="noselect collide">Graphic Design Is <em id="NOT">NOT</em> My Passion</p>
									<p class="noselect collide">Left Click to Summon the Boids<br>Middle Click to create a new wall</p>
								</div>
								<!-- end overlay -->
							</div>
						</div>
					</div>
				</div>
			</main>

		<footer id="site_footer">
			<div id="footer_links">
